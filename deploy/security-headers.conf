# ═══════════════════════════════════════════════════════════════
# Nginx Security Headers — TSi-MUSIC v2.9.5
# Incluído por todos os server blocks
# ═══════════════════════════════════════════════════════════════

# Prevent clickjacking
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevent MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Control referrer leakage
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# HSTS — 2 years, include subdomains, preload
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Legacy XSS protection (defense in depth)
add_header X-XSS-Protection "1; mode=block" always;

# Restrict browser features
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# Content Security Policy
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' wss: https:; media-src 'self' blob:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

# Hide server version
server_tokens off;
