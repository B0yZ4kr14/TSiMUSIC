worker_processes auto;
events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    server_tokens off;
    sendfile on;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript image/svg+xml;

    server {
        listen 80;
        return 301 https://$host:8443$request_uri;
    }

    server {
        listen 443 ssl;
        ssl_certificate /usr/share/nginx/html/certs/tailscale.crt;
        ssl_certificate_key /usr/share/nginx/html/certs/tailscale.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        root /usr/share/nginx/html;
        index index.html;

        # Proxy WebSocket API
        location /ws {
            proxy_pass http://127.0.0.1:8095/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # Proxy Sendspin streaming
        location /sendspin {
            proxy_pass http://127.0.0.1:8095/sendspin;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # Proxy stream server (images, previews)
        location /imageproxy {
            proxy_pass http://127.0.0.1:8097;
            proxy_set_header Host $host;
        }

        location /preview {
            proxy_pass http://127.0.0.1:8097;
            proxy_set_header Host $host;
        }

        # Proxy info endpoint
        location /info {
            proxy_pass http://127.0.0.1:8095/info;
            proxy_set_header Host $host;
        }

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location ~* \.html$ {
            expires 1d;
            add_header Cache-Control "public, must-revalidate" always;
        }

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable" always;
        }

        location ~* \.(json|webmanifest)$ {
            expires 1d;
            add_header Cache-Control "public, must-revalidate" always;
        }
    }
}
