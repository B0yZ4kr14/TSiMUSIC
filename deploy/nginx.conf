worker_processes auto;
events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    server_tokens off;
    sendfile on;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript image/svg+xml;

    # Server block 1: HTTP (80) — serves content directly for Tailscale Serve HTTP proxy
    server {
        listen 80;

        root /usr/share/nginx/html;
        index index.html;

        # Security Headers (server level — inherited by all locations)
        include /etc/nginx/security-headers.conf;

        # Generic cache settings
        expires 1d;
        add_header Cache-Control "public, must-revalidate" always;

        # Long-term cache for versioned assets (Vite hashed filenames)
        location ~* \.(?:js|css|woff2|png|jpg|jpeg|gif|svg|ico|webmanifest)$ {
            add_header Cache-Control "public, immutable, max-age=31536000" always;
            expires 1y;
            access_log off;
        }

        # Well-known files (security.txt, etc.)
        location /.well-known/ {
            allow all;
            default_type text/plain;
        }

        # WebSocket proxy to MA server with security headers preserved
        location /ws {
            proxy_pass http://172.18.0.1:8095/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_buffering off;
            proxy_read_timeout 86400;
        }

        location /sendspin {
            proxy_pass http://172.18.0.1:8095/sendspin;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_buffering off;
            proxy_read_timeout 86400;
        }

        location /imageproxy {
            proxy_pass http://172.18.0.1:8097;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_hide_header Strict-Transport-Security;
        }

        location /preview {
            proxy_pass http://172.18.0.1:8097;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_hide_header Strict-Transport-Security;
        }

        location /info {
            proxy_pass http://172.18.0.1:8095/info;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_hide_header Strict-Transport-Security;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Server block 2a: HTTPS (443) — Tailscale LE cert for hostname (SNI)
    server {
        listen 443 ssl;
        server_name midiaserver-saudeclinica.tailbda57.ts.net;

        ssl_certificate /usr/share/nginx/html/certs/tailscale.crt;
        ssl_certificate_key /usr/share/nginx/html/certs/tailscale.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        root /usr/share/nginx/html;
        index index.html;

        include /etc/nginx/security-headers.conf;

        expires 1d;
        add_header Cache-Control "public, must-revalidate" always;

        # Long-term cache for versioned assets (Vite hashed filenames)
        location ~* \.(?:js|css|woff2|png|jpg|jpeg|gif|svg|ico|webmanifest)$ {
            add_header Cache-Control "public, immutable, max-age=31536000" always;
            expires 1y;
            access_log off;
        }

        # Well-known files (security.txt, etc.)
        location /.well-known/ {
            allow all;
            default_type text/plain;
        }

        location /ws {
            proxy_pass http://172.18.0.1:8095/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_buffering off;
            proxy_read_timeout 86400;
        }

        location /sendspin {
            proxy_pass http://172.18.0.1:8095/sendspin;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_buffering off;
            proxy_read_timeout 86400;
        }

        location /imageproxy {
            proxy_pass http://172.18.0.1:8097;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_hide_header Strict-Transport-Security;
        }

        location /preview {
            proxy_pass http://172.18.0.1:8097;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_hide_header Strict-Transport-Security;
        }

        location /info {
            proxy_pass http://172.18.0.1:8095/info;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_hide_header Strict-Transport-Security;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Server block 2b: HTTPS (443) — Self-signed cert for IP access (default SNI fallback)
    server {
        listen 443 ssl default_server;

        ssl_certificate /usr/share/nginx/html/certs/ip-tailscale.crt;
        ssl_certificate_key /usr/share/nginx/html/certs/ip-tailscale.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        root /usr/share/nginx/html;
        index index.html;

        include /etc/nginx/security-headers.conf;

