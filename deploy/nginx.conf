worker_processes auto;
events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    server_tokens off;
    sendfile on;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript image/svg+xml;

    # Server block 1: HTTP (80) — serves content directly for Tailscale Serve HTTP proxy
    server {
        listen 80;

        root /usr/share/nginx/html;
        index index.html;

        # Security Headers (server level — inherited by all locations)
        include /etc/nginx/security-headers.conf;

        # Generic cache settings
        expires 1d;
        add_header Cache-Control "public, must-revalidate" always;

        location /ws {
            proxy_pass http://172.18.0.1:8095/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        location /sendspin {
            proxy_pass http://172.18.0.1:8095/sendspin;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        location /imageproxy {
            proxy_pass http://172.18.0.1:8097;
            proxy_set_header Host $host;
        }

        location /preview {
            proxy_pass http://172.18.0.1:8097;
            proxy_set_header Host $host;
        }

        location /info {
            proxy_pass http://172.18.0.1:8095/info;
            proxy_set_header Host $host;
        }

        location /cert-info {
            alias /usr/share/nginx/html/cert-info.html;
        }

        location /wiki {
            alias /usr/share/nginx/html/wiki/;
            index index.html;
            try_files $uri $uri/ =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Server block 2: HTTPS (443) — Tailscale hostname with valid LE certificate
    server {
        listen 443 ssl;
        server_name midiaserver-saudeclinica.tailbda57.ts.net midiaserver saudeclinica;
        ssl_certificate /usr/share/nginx/html/certs/tailscale.crt;
        ssl_certificate_key /usr/share/nginx/html/certs/tailscale.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        root /usr/share/nginx/html;
        index index.html;

        # Security Headers (server level — inherited by all locations)
        include /etc/nginx/security-headers.conf;

        # Generic cache settings
        expires 1d;
        add_header Cache-Control "public, must-revalidate" always;

        location /ws {
            proxy_pass http://172.18.0.1:8095/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        location /sendspin {
            proxy_pass http://172.18.0.1:8095/sendspin;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        location /imageproxy {
            proxy_pass http://172.18.0.1:8097;
            proxy_set_header Host $host;
        }

        location /preview {
            proxy_pass http://172.18.0.1:8097;
            proxy_set_header Host $host;
        }

        location /info {
            proxy_pass http://172.18.0.1:8095/info;
            proxy_set_header Host $host;
        }

        location /cert-info {
            alias /usr/share/nginx/html/cert-info.html;
        }

        location /wiki {
            alias /usr/share/nginx/html/wiki/;
            index index.html;
            try_files $uri $uri/ =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Server block 3: HTTPS (443) default — IP access with self-signed certificate
    server {
        listen 443 ssl default_server;
        server_name _;
        ssl_certificate /usr/share/nginx/html/certs/ip-tailscale.crt;
        ssl_certificate_key /usr/share/nginx/html/certs/ip-tailscale.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        root /usr/share/nginx/html;
        index index.html;

        # Security Headers (server level — inherited by all locations)
        include /etc/nginx/security-headers.conf;

        # Generic cache settings
        expires 1d;
        add_header Cache-Control "public, must-revalidate" always;

        location /ws {
            proxy_pass http://172.18.0.1:8095/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        location /sendspin {
            proxy_pass http://172.18.0.1:8095/sendspin;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        location /imageproxy {
            proxy_pass http://172.18.0.1:8097;
            proxy_set_header Host $host;
        }

        location /preview {
            proxy_pass http://172.18.0.1:8097;
            proxy_set_header Host $host;
        }

        location /info {
            proxy_pass http://172.18.0.1:8095/info;
            proxy_set_header Host $host;
        }

        location /cert-info {
            alias /usr/share/nginx/html/cert-info.html;
        }

        location /wiki {
            alias /usr/share/nginx/html/wiki/;
            index index.html;
            try_files $uri $uri/ =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
