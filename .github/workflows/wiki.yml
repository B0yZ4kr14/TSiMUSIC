# .github/workflows/wiki.yml
# TSi MUSIC — Wiki MkDocs deploy para GitHub Pages
# Versão: v1.0.0
#
# Trigger: push na branch main que modifica wiki/**
# Pipeline: checkout → setup Python → install deps → build mkdocs → deploy to gh-pages

name: Deploy Wiki to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - ".github/workflows/wiki.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # =============================================================================
  # JOB: Build e Deploy do MkDocs
  # =============================================================================
  deploy:
    name: Build & Deploy MkDocs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r wiki/requirements.txt

      - name: Build MkDocs
        run: |
          cd wiki
          mkdocs build --strict

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: wiki/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
