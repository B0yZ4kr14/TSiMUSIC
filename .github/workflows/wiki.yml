# .github/workflows/wiki.yml
# TSi MUSIC Wiki — Build e Deploy para GitHub Pages
# Versão: v2.9.6
#
# Trigger: push na main que modifica wiki/** ou .github/workflows/wiki.yml
# Build: MkDocs with Material theme
# Deploy: gh-pages branch via peaceiris/actions-gh-pages

name: Deploy Wiki to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - ".github/workflows/wiki.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "wiki-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r wiki/requirements.txt

      - name: Build MkDocs
        run: |
          cd wiki && mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: wiki/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
