# .github/workflows/wiki.yml
# TSi MUSIC Wiki — Deploy Static to GitHub Pages
# Versão: v2.9.7
#
# Trigger: push na main que modifica public/** ou .github/workflows/wiki.yml
# Deploy: Copia public/ diretamente para gh-pages branch

name: Deploy Wiki to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "public/**"
      - ".github/workflows/wiki.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "wiki-pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy public/ to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          cname: ""
