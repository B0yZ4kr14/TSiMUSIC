# .github/workflows/wiki.yml
# TSi MUSIC Wiki — Build e Deploy para GitHub Pages
# Versão: v2.9.6
#
# Trigger: push na main que modifica wiki/** ou .github/workflows/wiki.yml
# Build: MkDocs with Material theme
# Deploy: gh-pages branch via peaceiris/actions-gh-pages

name: Deploy Wiki to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - ".github/workflows/wiki.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "wiki-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r wiki/requirements.txt

      - name: Build MkDocs
        run: |
          cd wiki && mkdocs build --strict

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./wiki/site
          publish_branch: gh-pages
          cname: ""
